services:
  frontend-host-proxy:
    image: xianyu-auto-reply-official-frontend
    container_name: xianyu-host-proxy
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
            listen 80;
            server_name _;

            client_max_body_size 50m;

            location / {
                proxy_pass http://xianyu-frontend:80;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 86400s;
                proxy_connect_timeout 75s;
            }
        }

        server {
            listen 8317;
            server_name _;

            client_max_body_size 50m;

            location / {
                proxy_pass http://192.168.124.168:8317;
                proxy_http_version 1.1;
                proxy_set_header Host 192.168.124.168:8317;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_read_timeout 300s;
                proxy_connect_timeout 30s;
            }
        }
        EOF
        nginx -g 'daemon off;'
    ports:
      - "18081:80"
    networks:
      - xianyu-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  xianyu-network:
    external: true
    name: xianyu-auto-reply-official_xianyu-network
